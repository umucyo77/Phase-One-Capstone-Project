<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Book Explorer</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 text-gray-800">
	<!-- NAVBAR -->
	<header class="bg-sky-950 shadow-sm sticky top-0 z-50">
		<div class="container mx-auto px-4 sm:px-6 md:px-8 py-4 flex items-center justify-between">
			<div class="flex items-center gap-3">
				<img src="logo.png" alt="Book Logo" class="w-10 h-10 object-contain">
				<a href="index.html" class="text-xl sm:text-2xl font-semibold text-white hover:text-indigo-600">Book
					Explorer</a>
			</div>

			<nav class="hidden md:flex items-center space-x-6">
				<a href="#books"
				class="text-white font-semibold hover:text-indigo-600 cursor-pointer bg-none border-none p-0">Home</a>
			<a href="about.html"
				class="text-white font-semibold hover:text-indigo-600 cursor-pointer bg-none border-none p-0">About</a>
			<a href="favorites.html"
					class="text-white font-semibold hover:text-indigo-600 cursor-pointer bg-none border-none p-0">Favorites</a>

			</nav>
			<button id="menuBtn" class="md:hidden p-2 rounded-md text-white hover:bg-sky-900">
				<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
					stroke="currentColor">
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
				</svg>
			</button>
		</div>
		<div id="mobileMenu" class="md:hidden border-t hidden bg-sky-900">
			<div class="px-4 py-3 space-y-2">
				<a href="#books" class="block text-white hover:text-indigo-600">Home</a>
				<a href="about.html" class="block text-white hover:text-indigo-600">About</a>
				<a href="favorites.html" class="block text-white hover:text-indigo-600">Favorites</a>
			</div>
		</div>
	</header>

	<!-- HERO -->
	<section class="bg-sky-500 text-white">
		<div class="container mx-auto px-4 sm:px-6 md:px-8 py-12 sm:py-16 md:py-20 text-center">
			<h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold">Discover Your Next Favorite Book</h1>
			<p class="mt-4 text-indigo-100 text-sm sm:text-base max-w-2xl mx-auto">Explore curated lists, trending
				titles, and recommendations tailored to your taste.</p>
			<div class="mt-8 flex flex-col sm:flex-row justify-center gap-3 sm:gap-4">
				<a href="#books"
					class="w-full sm:w-auto bg-white text-indigo-600 px-6 py-3 rounded-lg font-semibold hover:shadow-md text-center">Browse
					Books</a>
			</div>
		</div>
	</section>

	<!-- CONTENT: Responsive Grid -->
	<main class="container mx-auto px-4 sm:px-6 md:px-8 py-8 sm:py-12" id="books">
		<div class="flex items-center justify-between">
			<h2 class="text-xl sm:text-2xl font-semibold">Featured Books</h2>
		</div>

		<div class="mt-6">
			<form id="bookSearchForm" class="flex flex-col sm:flex-row gap-2">
				<input id="search-input" type="search" placeholder="Search books by title"
					class="flex-1 border border-gray-300 rounded-lg py-2 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
				<button id="search-btn" type="button"
					class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white px-4 sm:px-6 py-2 rounded-lg font-medium text-sm sm:text-base shadow-md hover:shadow-lg hover:from-indigo-700 hover:to-indigo-800 active:scale-95 transition-all duration-200 cursor-pointer whitespace-nowrap">Search</button>
			</form>

			<div id="loading" class="mt-6 text-center text-gray-600 hidden">
				<div class="inline-block">
					<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
				</div>
			</div>
			<div id="display-grid" class="mt-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
		</div>
	</main>

	<!-- FOOTER -->
	<footer class="bg-sky-950 text-white text-center p-4 ">
		© 2026 Book Explorer. All rights reserved.
	</footer>



	<script type="module" src="./js/main.js"></script>

</body>

</html>
