<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>My Favorites - Book Explorer</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 text-gray-800">
	<!-- NAVBAR -->
	<header class="bg-sky-950 shadow-sm sticky top-0 z-50">
		<div class="container mx-auto px-4 sm:px-6 md:px-8 py-4 flex items-center justify-between">
			<div class="flex items-center gap-3">
				<img src="logo.png" alt="Book Logo" class="w-10 h-10 object-contain">
				<a href="index.html" class="text-xl sm:text-2xl font-semibold text-white hover:text-indigo-600">Book
					Explorer</a>
			</div>

			<nav class="hidden md:flex items-center space-x-6">
				<a href="index.html"
					class="text-white font-semibold hover:text-indigo-600 cursor-pointer bg-none border-none p-0">Home</a>
			<a href="about.html"
				class="text-white font-semibold hover:text-indigo-600 cursor-pointer bg-none border-none p-0">About</a>
			<a href="favorites.html"
					class="text-white font-semibold hover:text-indigo-600 cursor-pointer bg-none border-none p-0">Favorites</a>

			</nav>
			<button id="menuBtn" class="md:hidden p-2 rounded-md text-white hover:bg-sky-900">
				<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
					stroke="currentColor">
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
				</svg>
			</button>
		</div>
		<div id="mobileMenu" class="md:hidden border-t hidden bg-sky-900">
			<div class="px-4 py-3 space-y-2">
				<a href="index.html" class="block text-white hover:text-indigo-600">Home</a>
			<a href="about.html" class="block text-white hover:text-indigo-600">About</a>
				<a href="favorites.html" class="block text-white hover:text-indigo-600">Favorites</a>
			</div>
		</div>
	</header>

	<!-- HERO -->
	<section class="bg-rose-500 text-white">
		<div class="container mx-auto px-4 sm:px-6 md:px-8 py-12 sm:py-16 md:py-20 text-center">
			<h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold">❤️ My Favorite Books</h1>
			<p class="mt-4 text-rose-100 text-sm sm:text-base max-w-2xl mx-auto">Your curated collection of books you
				love. Save your favorites and revisit them anytime.</p>
		</div>
	</section>

	<!-- CONTENT: Responsive Grid -->
	<main class="container mx-auto px-4 sm:px-6 md:px-8 py-8 sm:py-12">
		<div class="flex items-center justify-between mb-6">
			<h2 class="text-xl sm:text-2xl font-semibold">Saved Books</h2>
			<button id="clear-all"
				class="bg-red-600 text-white px-4 py-2 rounded-lg font-medium text-sm hover:bg-red-700 transition">
				Clear All
			</button>
		</div>

		<div id="loading" class="mt-6 text-center text-gray-600 hidden">
			<div class="inline-block">
				<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-rose-600"></div>
			</div>
		</div>
		<div id="display-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
	</main>

	<!-- FOOTER -->
	<footer class="bg-sky-950 text-white text-center p-4 ">
		© 2026 Book Explorer. All rights reserved.
	</footer>



	<script type="module" src="./js/main.js"></script>

</body>

</html>
